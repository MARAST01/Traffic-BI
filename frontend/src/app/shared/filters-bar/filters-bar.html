<div class="filters-bar">

  <div class="filters-bar__left">
    <div class="filters-bar__title">
      <lucide-icon name="SlidersHorizontal" [size]="16" />
      <span>Filtros</span>
      <span class="active-badge" *ngIf="hasActive()">
        {{ activeCount() }}
      </span>
    </div>

    <!-- Skeleton mientras cargan las opciones -->
    <div class="filters-bar__selects" *ngIf="!optionsLoaded()">
      <div class="filter-group" *ngFor="let _ of [1,2,3,4,5]">
        <label>&nbsp;</label>
        <div class="filter-select filter-select--skeleton"></div>
      </div>
    </div>

    <!-- Selects reales: solo se montan cuando las opciones ya están disponibles -->
    <div class="filters-bar__selects" *ngIf="optionsLoaded()">

      <div class="filter-group">
        <label>Año</label>
        <select [value]="safeYear()" (change)="updateDraft('year', $event)" class="filter-select">
          <option *ngFor="let y of years()" [value]="y">{{ y }}</option>
        </select>
      </div>

      <div class="filter-group">
        <label>Mes</label>
        <select [value]="draft().month" (change)="updateDraft('month', $event)" class="filter-select">
          <option *ngFor="let month of months" [value]="month">{{ month }}</option>
        </select>
      </div>

      <div class="filter-group">
        <label>Estado</label>
        <select [value]="safeState()" (change)="updateDraft('state', $event)" class="filter-select">
          <option *ngFor="let s of states()" [value]="s">{{ s }}</option>
        </select>
      </div>

      <div class="filter-group">
        <label>Severidad</label>
        <select [value]="draft().severity" (change)="updateDraft('severity', $event)" class="filter-select">
          <option *ngFor="let sv of severities" [value]="sv">{{ sv }}</option>
        </select>
      </div>

      <div class="filter-group">
        <label>Clima</label>
        <select [value]="safeWeather()" (change)="updateDraft('weather', $event)" class="filter-select">
          <option *ngFor="let w of weathers()" [value]="w">{{ w }}</option>
        </select>
      </div>

    </div>
  </div>

  <div class="filters-bar__actions">

    <button
      class="btn-reset"
      *ngIf="hasActive()"
      (click)="reset()"
      title="Limpiar filtros"
    >
      <lucide-icon name="X" [size]="14" />
      Limpiar
    </button>

    <button class="btn-apply" (click)="apply()" title="Aplicar filtros">
      <lucide-icon name="Search" [size]="14" />
      Aplicar
    </button>

    <button class="btn-download btn-download--secondary" (click)="onDownload('pdf')">
      <lucide-icon name="Download" [size]="15" />
      PDF
    </button>

    <button class="btn-download" (click)="onDownload('xlsx')">
      <lucide-icon name="Download" [size]="15" />
      Excel
    </button>

  </div>

</div>
